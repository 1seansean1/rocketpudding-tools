<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Markdown Studio — Rocket Pudding Tools</title>
<meta name="description" content="Split-pane live markdown editor with GFM preview, sandboxed rendering, and standalone HTML export.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  :root{
    --bg:#f4f3ef; --fg:#191b1e; --muted:#8a8d93; --line:#dcd9d2; --card:#ffffff;
    --accent:#3f6f8f; --accent-soft:#e6edf3; --accent-text:#3f6f8f;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#16171a; --fg:#eceae4; --muted:#8a8d93; --line:#2b2d31; --card:#1e2024;
           --accent:#3f6f8f; --accent-soft:#1d262d; --accent-text:#7fa8c4; }
  }
  html,body{margin:0;height:100%}
  body{display:flex;flex-direction:column;background:var(--bg);color:var(--fg);
    font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:#fff}
  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;padding:0}

  header.top{display:flex;align-items:center;gap:12px;height:52px;padding:0 18px;
    border-bottom:1px solid var(--line);flex:none}
  .logo{width:13px;height:13px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px rgba(63,111,143,.55)}
  .brand{font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:1.6px;font-size:13px}
  .back{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--muted)}
  .back:hover{color:var(--accent-text)}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:7px 14px;
    border-bottom:1px solid var(--line);flex:none}
  .fmt{display:flex;align-items:center;gap:2px}
  .fmt button{display:flex;align-items:center;justify-content:center;width:30px;height:30px;
    border-radius:7px;color:var(--muted)}
  .fmt button:hover{background:var(--accent-soft);color:var(--accent-text)}
  .fmt button:active{transform:translateY(1px)}
  .fmt svg{width:16px;height:16px}
  .vr{width:1px;height:20px;background:var(--line)}
  .actions{display:flex;align-items:center;gap:6px;margin-left:auto;flex-wrap:wrap}
  .actions button{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;
    font-size:11px;font-weight:500;color:var(--fg);border:1px solid var(--line);background:var(--card);
    border-radius:7px;padding:5px 10px}
  .actions button:hover{border-color:var(--accent);color:var(--accent-text)}
  .actions button:active{transform:translateY(1px)}
  .actions svg{width:13px;height:13px;color:var(--muted)}
  .actions button:hover svg{color:var(--accent-text)}

  main.panes{flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0}
  .pane{display:flex;flex-direction:column;min-height:0;min-width:0}
  .pane-editor{border-right:1px solid var(--line)}
  .pane-head{display:flex;align-items:center;gap:10px;height:32px;padding:0 16px;flex:none;
    border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:9.5px;
    font-weight:600;letter-spacing:1.2px;color:var(--muted);text-transform:uppercase}
  .pane-head .ph-right{margin-left:auto;font-weight:400;letter-spacing:.4px;text-transform:none}
  #editor{flex:1;width:100%;resize:none;border:0;outline:none;background:transparent;color:var(--fg);
    font:400 13.5px/1.7 'IBM Plex Mono',ui-monospace,monospace;padding:18px 20px;tab-size:2}
  #editor::placeholder{color:var(--muted);opacity:.7}

  .pane-preview{background:var(--card)}
  .pane-preview .pane-head{background:var(--bg)}
  .preview-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;background:var(--card)}
  #previewFrame{display:block;width:100%;height:200px;border:0}
  #measureFrame{position:fixed;left:-10000px;top:0;width:600px;height:80px;visibility:hidden;border:0}

  .sync{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:1px;color:var(--muted)}
  .sync input{position:absolute;opacity:0;width:0;height:0}
  .sync .track{width:26px;height:14px;border-radius:20px;background:var(--line);position:relative;
    transition:background .15s ease;flex:none}
  .sync .knob{position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;
    background:var(--card);transition:transform .15s ease;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .sync input:checked + .track{background:var(--accent)}
  .sync input:checked + .track .knob{transform:translateX(12px)}
  .sync input:focus-visible + .track{outline:2px solid var(--accent);outline-offset:2px}

  footer.status{display:flex;align-items:center;gap:16px;height:32px;padding:0 16px;flex:none;
    border-top:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--muted)}
  #flash{color:var(--accent-text);opacity:0;transition:opacity .25s ease}
  #flash.on{opacity:1}
  .lib{margin-left:auto}

  @media (max-width: 860px){
    main.panes{grid-template-columns:1fr;grid-template-rows:minmax(240px,1fr) minmax(240px,1fr)}
    .pane-editor{border-right:0;border-bottom:1px solid var(--line)}
    footer.status{height:auto;padding:8px 16px;flex-wrap:wrap;gap:8px}
  }
</style>
</head>
<body>
  <header class="top">
    <div class="logo"></div>
    <div class="brand">MARKDOWN&nbsp;STUDIO</div>
    <a class="back" href="../../">&larr; tools</a>
  </header>

  <div class="toolbar">
    <div class="fmt" role="toolbar" aria-label="Formatting">
      <button id="btnHeading" title="Heading (adds # to line)" aria-label="Heading">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3.5 3v10M11 3v10M3.5 8H11"/></svg>
      </button>
      <button id="btnBold" title="Bold (Ctrl+B)" aria-label="Bold">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h4a2.5 2.5 0 0 1 0 5H5zM5 8h4.7a2.5 2.5 0 0 1 0 5H5z"/><path d="M5 3v10"/></svg>
      </button>
      <button id="btnItalic" title="Italic (Ctrl+I)" aria-label="Italic">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3h5M4 13h5M10 3 6 13"/></svg>
      </button>
      <button id="btnCode" title="Code (inline, or fence for multi-line selection)" aria-label="Code">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="m5 5-3 3 3 3M11 5l3 3-3 3"/></svg>
      </button>
      <button id="btnLink" title="Link (Ctrl+K)" aria-label="Link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.7 9.3 9.3 6.7M7.2 4.6l1.4-1.4a2.75 2.75 0 0 1 3.9 3.9l-1.4 1.4M8.8 11.4l-1.4 1.4a2.75 2.75 0 0 1-3.9-3.9l1.4-1.4"/></svg>
      </button>
      <button id="btnList" title="Bulleted list (toggles - on selected lines)" aria-label="Bulleted list">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M6.5 4h7M6.5 8h7M6.5 12h7"/><circle cx="3" cy="4" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="8" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <button id="btnTable" title="Insert table" aria-label="Insert table">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M2 6.6h12M6.6 6.6V13M10.7 6.6V13"/></svg>
      </button>
    </div>
    <span class="vr"></span>
    <div class="actions">
      <button id="btnSample" title="Load the sample document">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2H4.5A1.5 1.5 0 0 0 3 3.5v9A1.5 1.5 0 0 0 4.5 14h7a1.5 1.5 0 0 0 1.5-1.5V6z"/><path d="M9 2v4h4M6 9h4M6 11.5h4"/></svg>
        Sample
      </button>
      <button id="btnClear" title="Delete the saved draft and empty the editor">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 4.5h11M6.5 4.5V3a1 1 0 0 1 1-1h1a1 1 0 0 1 1 1v1.5M4.5 4.5 5 13a1 1 0 0 0 1 1h4a1 1 0 0 0 1-1l.5-8.5"/></svg>
        Clear draft
      </button>
      <span class="vr"></span>
      <button id="btnCopy" title="Copy rendered HTML to the clipboard">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><rect x="5.5" y="5.5" width="8" height="8" rx="1.5"/><path d="M10.5 5.5v-2a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2"/></svg>
        Copy HTML
      </button>
      <button id="btnDlMd" title="Download the markdown source">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2.5v7M5 7l3 2.5L11 7M3 13.5h10"/></svg>
        .md
      </button>
      <button id="btnDlHtml" title="Download a standalone styled HTML document">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2.5v7M5 7l3 2.5L11 7M3 13.5h10"/></svg>
        .html
      </button>
    </div>
  </div>

  <main class="panes">
    <section class="pane pane-editor">
      <div class="pane-head">
        <span>Editor</span>
        <span class="ph-right" id="autosaveState"></span>
      </div>
      <textarea id="editor" spellcheck="false" autocomplete="off"
        placeholder="Write markdown here&hellip;" aria-label="Markdown source"></textarea>
    </section>
    <section class="pane pane-preview">
      <div class="pane-head">
        <span>Preview</span>
        <label class="sync" title="Proportionally sync editor and preview scrolling">
          <input type="checkbox" id="syncToggle" checked>
          <span class="track"><span class="knob"></span></span>
          sync scroll
        </label>
      </div>
      <div class="preview-scroll" id="previewPane">
        <!-- Rendered markdown lives here. sandbox="" = opaque origin, zero script
             execution, no top-navigation, no forms: pasted HTML/scripts are inert. -->
        <iframe id="previewFrame" sandbox="" title="Rendered markdown preview"></iframe>
      </div>
    </section>
  </main>

  <footer class="status">
    <span id="stats">0 words &middot; 0 chars &middot; 0 min read</span>
    <span id="flash"></span>
    <span class="lib">marked v15 &middot; MIT</span>
  </footer>

  <!-- Hidden measurement frame: same document as the preview, used ONLY to read the
       rendered content height so the visible sandbox="" frame can be sized (the parent
       cannot read anything out of an opaque-origin frame). allow-same-origin WITHOUT
       allow-scripts still blocks ALL script execution (script tags, inline handlers,
       javascript: URLs) at the browser level, so no pasted code can run here either. -->
  <iframe id="measureFrame" sandbox="allow-same-origin" aria-hidden="true" tabindex="-1" title="hidden measurement frame"></iframe>

  <script src="marked.min.js"></script>
  <script>
  'use strict';
  /* ---------- shared preview stylesheet (iframe srcdoc + standalone export) ---------- */
  var PREVIEW_CSS = [
    "@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');",
    ':root{--bg:#ffffff;--fg:#191b1e;--muted:#6f7379;--line:#dcd9d2;--soft:#f4f3ef;--accent:#3f6f8f}',
    '@media (prefers-color-scheme: dark){:root{--bg:#1e2024;--fg:#eceae4;--muted:#9a9da3;--line:#2b2d31;--soft:#17181b;--accent:#7fa8c4}}',
    '*{box-sizing:border-box}',
    'html,body{margin:0}',
    "body{background:var(--bg);color:var(--fg);font:400 15px/1.7 'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;padding:28px 34px 40px;-webkit-font-smoothing:antialiased;word-wrap:break-word}",
    'body>:first-child{margin-top:0}',
    'h1,h2,h3,h4,h5,h6{font-weight:600;line-height:1.3;margin:1.5em 0 .55em}',
    'h1{font-size:1.85em;padding-bottom:.35em;border-bottom:1px solid var(--line)}',
    'h2{font-size:1.4em;padding-bottom:.3em;border-bottom:1px solid var(--line)}',
    'h3{font-size:1.15em}h4{font-size:1em}h5{font-size:.92em}h6{font-size:.88em;color:var(--muted)}',
    'p{margin:.85em 0}',
    'a{color:var(--accent);text-decoration:none;border-bottom:1px solid transparent}',
    'a:hover{border-bottom-color:var(--accent)}',
    'strong{font-weight:600}',
    'del{color:var(--muted)}',
    "code{font-family:'IBM Plex Mono',ui-monospace,SFMono-Regular,monospace;font-size:.88em;background:var(--soft);border:1px solid var(--line);border-radius:5px;padding:.1em .35em}",
    'pre{background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:14px 16px;overflow-x:auto;line-height:1.55;margin:1em 0}',
    'pre code{background:none;border:0;padding:0;font-size:.85em}',
    'blockquote{margin:1em 0;padding:.2em 1.1em;border-left:3px solid var(--accent);color:var(--muted)}',
    'blockquote>:first-child{margin-top:0}blockquote>:last-child{margin-bottom:0}',
    'ul,ol{padding-left:1.6em;margin:.85em 0}',
    'li{margin:.25em 0}',
    'li:has(> input[type=checkbox]){list-style:none;margin-left:-1.35em}',
    'input[type=checkbox]{accent-color:var(--accent);margin-right:.45em;vertical-align:-.1em}',
    'table{border-collapse:collapse;margin:1em 0;display:block;max-width:100%;overflow-x:auto;font-size:.95em}',
    'th,td{border:1px solid var(--line);padding:7px 13px;text-align:left}',
    'th{background:var(--soft);font-weight:600}',
    'hr{border:0;border-top:1px solid var(--line);margin:2em 0}',
    'img{max-width:100%;border-radius:6px}'
  ].join('\n');

  var SAMPLE = [
    '# Markdown Studio',
    '',
    'A split-pane editor with a **live preview**. Everything renders inside a fully',
    'sandboxed frame, so pasted HTML and scripts stay *inert*. Try the toolbar, or',
    'edit this document — your draft autosaves locally.',
    '',
    '## Formatting',
    '',
    'Inline styles: **bold**, *italic*, ~~strikethrough~~, and `inline code`.',
    'Links work too — [back to the registry](../../).',
    '',
    '> Blockquotes are great for callouts, citations, and asides.',
    '> They can span multiple lines.',
    '',
    '## Lists',
    '',
    '1. Ordered items',
    '2. Stay ordered',
    '   - Nested bullets indent with three spaces',
    '   - Like this',
    '',
    '### Task list (GFM)',
    '',
    '- [x] Write some markdown',
    '- [x] Watch it render live',
    '- [ ] Download the standalone HTML',
    '',
    '## Table (GFM)',
    '',
    '| Feature | Shortcut | Notes |',
    '| --- | --- | --- |',
    '| Bold | Ctrl+B | Wraps the selection |',
    '| Italic | Ctrl+I | Wraps the selection |',
    '| Link | Ctrl+K | Selects the url placeholder |',
    '| Sync scroll | toggle | Proportional, both directions |',
    '',
    '## Code',
    '',
    '```js',
    'function readingTime(words) {',
    '  return Math.max(1, Math.round(words / 200)); // ~200 wpm',
    '}',
    '```',
    '',
    '---',
    '',
    'Drafts persist in `localStorage`. Use **Clear draft** to start fresh,',
    'or **Download .html** for a self-contained, styled document.'
  ].join('\n');

  /* ---------- elements ---------- */
  var editor        = document.getElementById('editor');
  var previewFrame  = document.getElementById('previewFrame');
  var measureFrame  = document.getElementById('measureFrame');
  var previewPane   = document.getElementById('previewPane');
  var syncToggle    = document.getElementById('syncToggle');
  var statsEl       = document.getElementById('stats');
  var flashEl       = document.getElementById('flash');
  var autosaveState = document.getElementById('autosaveState');

  var DRAFT_KEY = 'markdown-studio.draft.v1';
  var lastHtml  = '';

  if (window.marked && marked.use) marked.use({ gfm: true, breaks: false });

  /* ---------- document shell ---------- */
  function escapeHtml(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function docShell(bodyHtml, title){
    return '<!doctype html>\n<html lang="en">\n<head>\n<meta charset="utf-8">\n' +
      '<meta name="viewport" content="width=device-width, initial-scale=1">\n' +
      (title ? '<title>' + escapeHtml(title) + '</title>\n' : '') +
      '<style>\n' + PREVIEW_CSS + '\n</style>\n</head>\n<body>\n' +
      bodyHtml + '\n</body>\n</html>';
  }

  /* ---------- render pipeline ---------- */
  function render(){
    var md = editor.value;
    if (window.marked) {
      lastHtml = marked.parse(md);
    } else {
      lastHtml = '<p><strong>marked.min.js failed to load.</strong> The preview is unavailable.</p>';
    }
    var doc = docShell(lastHtml, null);
    previewFrame.srcdoc = doc;
    measureFrame.srcdoc = doc;
    updateStats(md);
  }
  var renderT = null;
  function scheduleRender(){
    clearTimeout(renderT);
    renderT = setTimeout(render, 150);
  }

  /* ---------- height measurement (see measureFrame comment above) ---------- */
  function syncWidths(){
    measureFrame.style.width = (previewFrame.clientWidth || previewPane.clientWidth) + 'px';
  }
  function measureNow(){
    var d = measureFrame.contentDocument;
    if (!d || !d.documentElement) return;
    var h = Math.max(d.documentElement.scrollHeight, d.body ? d.body.scrollHeight : 0);
    previewFrame.style.height = (h + 8) + 'px';
  }
  function queueMeasure(){ requestAnimationFrame(measureNow); }
  measureFrame.addEventListener('load', function(){
    syncWidths();
    queueMeasure();
    var d = measureFrame.contentDocument;
    if (d) {
      d.addEventListener('load', queueMeasure, true); /* images resize the doc */
      if (d.fonts && d.fonts.ready && d.fonts.ready.then) d.fonts.ready.then(queueMeasure);
    }
    setTimeout(queueMeasure, 350);
    setTimeout(queueMeasure, 1200);
  });
  if (window.ResizeObserver) {
    new ResizeObserver(function(){ syncWidths(); queueMeasure(); }).observe(previewPane);
  } else {
    window.addEventListener('resize', function(){ syncWidths(); queueMeasure(); });
  }

  /* ---------- proportional synced scrolling ---------- */
  var lockSrc = null, lockAt = 0;
  function scrollFrac(el){
    var m = el.scrollHeight - el.clientHeight;
    return m > 0 ? el.scrollTop / m : 0;
  }
  function setScrollFrac(el, f){
    var m = el.scrollHeight - el.clientHeight;
    if (m > 0) el.scrollTop = f * m;
  }
  function locked(src){
    var now = performance.now();
    if (lockSrc && lockSrc !== src && now - lockAt < 140) return true;
    lockSrc = src; lockAt = now;
    return false;
  }
  editor.addEventListener('scroll', function(){
    if (!syncToggle.checked || locked('editor')) return;
    setScrollFrac(previewPane, scrollFrac(editor));
  });
  previewPane.addEventListener('scroll', function(){
    if (!syncToggle.checked || locked('preview')) return;
    setScrollFrac(editor, scrollFrac(previewPane));
  });

  /* ---------- stats ---------- */
  function updateStats(md){
    var words = (md.match(/\S+/g) || []).length;
    var chars = md.length;
    var mins  = words ? Math.max(1, Math.round(words / 200)) : 0;
    statsEl.textContent = words.toLocaleString() + ' words · ' +
      chars.toLocaleString() + ' chars · ~' + mins + ' min read';
  }

  /* ---------- flash + autosave ---------- */
  var flashT = null;
  function flash(msg){
    flashEl.textContent = msg;
    flashEl.classList.add('on');
    clearTimeout(flashT);
    flashT = setTimeout(function(){ flashEl.classList.remove('on'); }, 2400);
  }
  function nowTime(){
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }
  function saveDraft(){
    try {
      localStorage.setItem(DRAFT_KEY, editor.value);
      autosaveState.textContent = 'draft saved ' + nowTime();
    } catch (e) {
      autosaveState.textContent = 'autosave unavailable';
    }
  }
  var saveT = null;
  editor.addEventListener('input', function(){
    scheduleRender();
    clearTimeout(saveT);
    saveT = setTimeout(saveDraft, 500);
  });

  /* ---------- undo-friendly editing primitives ---------- */
  function insertAtSelection(text){
    editor.focus();
    var ok = false;
    try { ok = document.execCommand('insertText', false, text); } catch (e) { ok = false; }
    if (!ok) {
      editor.setRangeText(text, editor.selectionStart, editor.selectionEnd, 'end');
      editor.dispatchEvent(new Event('input', { bubbles: true }));
    }
  }
  function wrapSelection(before, after, placeholder){
    var s = editor.selectionStart, e = editor.selectionEnd;
    var sel = editor.value.slice(s, e) || placeholder;
    insertAtSelection(before + sel + after);
    var start = s + before.length;
    editor.setSelectionRange(start, start + sel.length);
  }
  function lineOp(transform){
    var v = editor.value;
    var s = editor.selectionStart, e = editor.selectionEnd;
    var ls = v.lastIndexOf('\n', s - 1) + 1;
    var le = v.indexOf('\n', e);
    if (le === -1) le = v.length;
    var out = transform(v.slice(ls, le).split('\n')).join('\n');
    editor.focus();
    editor.setSelectionRange(ls, le);
    insertAtSelection(out);
    editor.setSelectionRange(ls, ls + out.length);
  }

  /* ---------- toolbar actions ---------- */
  function doBold(){ wrapSelection('**', '**', 'bold text'); }
  function doItalic(){ wrapSelection('*', '*', 'italic text'); }
  function doCode(){
    var sel = editor.value.slice(editor.selectionStart, editor.selectionEnd);
    if (sel.indexOf('\n') >= 0) wrapSelection('```\n', '\n```', sel);
    else wrapSelection('`', '`', 'code');
  }
  function doLink(){
    var s = editor.selectionStart, e = editor.selectionEnd;
    var sel = editor.value.slice(s, e) || 'link text';
    editor.focus();
    insertAtSelection('[' + sel + '](url)');
    var us = s + sel.length + 3; /* past "[sel](" */
    editor.setSelectionRange(us, us + 3);
  }
  function doHeading(){
    lineOp(function(lines){
      return lines.map(function(l){
        if (/^######/.test(l)) return l;          /* already at max depth */
        if (/^#/.test(l)) return '#' + l;         /* deepen existing heading */
        return '## ' + l;
      });
    });
  }
  function doList(){
    lineOp(function(lines){
      var all = lines.every(function(l){ return /^\s*- /.test(l) || l.trim() === ''; });
      return lines.map(function(l){
        if (l.trim() === '') return l;
        return all ? l.replace(/^(\s*)- /, '$1') : '- ' + l;
      });
    });
  }
  function doTable(){
    var v = editor.value, s = editor.selectionStart;
    var pre = (s === 0 || v[s - 1] === '\n') ? '' : '\n';
    insertAtSelection(pre +
      '\n| Column 1 | Column 2 | Column 3 |\n' +
      '| --- | --- | --- |\n' +
      '| Cell | Cell | Cell |\n' +
      '| Cell | Cell | Cell |\n\n');
  }

  /* keep textarea focus + selection when clicking toolbar buttons */
  document.querySelector('.fmt').addEventListener('mousedown', function(ev){
    ev.preventDefault();
  });
  document.getElementById('btnBold').addEventListener('click', doBold);
  document.getElementById('btnItalic').addEventListener('click', doItalic);
  document.getElementById('btnCode').addEventListener('click', doCode);
  document.getElementById('btnLink').addEventListener('click', doLink);
  document.getElementById('btnHeading').addEventListener('click', doHeading);
  document.getElementById('btnList').addEventListener('click', doList);
  document.getElementById('btnTable').addEventListener('click', doTable);

  editor.addEventListener('keydown', function(ev){
    if (ev.key === 'Tab' && !ev.shiftKey) { ev.preventDefault(); insertAtSelection('  '); return; }
    if (!(ev.ctrlKey || ev.metaKey) || ev.altKey) return;
    var k = ev.key.toLowerCase();
    if (k === 'b') { ev.preventDefault(); doBold(); }
    else if (k === 'i') { ev.preventDefault(); doItalic(); }
    else if (k === 'k') { ev.preventDefault(); doLink(); }
  });

  /* ---------- copy + downloads ---------- */
  function copyText(text){
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return new Promise(function(resolve, reject){
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed'; ta.style.left = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch (e) {}
      ta.remove();
      ok ? resolve() : reject(new Error('copy failed'));
    });
  }
  function download(name, mime, content){
    var url = URL.createObjectURL(new Blob([content], { type: mime }));
    var a = document.createElement('a');
    a.href = url; a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); }, 800);
  }
  function docTitle(){
    var m = editor.value.match(/^#{1,6}\s+(.+?)\s*$/m);
    return m ? m[1].replace(/[#*_`~[\]]/g, '').trim() : '';
  }
  function fileBase(){
    var t = docTitle().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
    return t || 'document';
  }
  document.getElementById('btnCopy').addEventListener('click', function(){
    copyText(lastHtml).then(
      function(){ flash('HTML copied to clipboard'); },
      function(){ flash('Copy failed — clipboard blocked'); }
    );
  });
  document.getElementById('btnDlMd').addEventListener('click', function(){
    download(fileBase() + '.md', 'text/markdown;charset=utf-8', editor.value);
    flash('Downloaded ' + fileBase() + '.md');
  });
  document.getElementById('btnDlHtml').addEventListener('click', function(){
    var standalone = docShell(lastHtml, docTitle() || 'Markdown document');
    download(fileBase() + '.html', 'text/html;charset=utf-8', standalone);
    flash('Downloaded ' + fileBase() + '.html');
  });

  /* ---------- sample + clear draft ---------- */
  document.getElementById('btnSample').addEventListener('click', function(){
    editor.value = SAMPLE;
    render();
    saveDraft();
    flash('Sample document loaded');
  });
  document.getElementById('btnClear').addEventListener('click', function(){
    try { localStorage.removeItem(DRAFT_KEY); } catch (e) {}
    editor.value = '';
    render();
    autosaveState.textContent = 'draft cleared';
    flash('Draft cleared');
    editor.focus();
  });

  /* ---------- init: restore draft or load sample ---------- */
  var draft = null;
  try { draft = localStorage.getItem(DRAFT_KEY); } catch (e) {}
  if (draft !== null && draft !== '') {
    editor.value = draft;
    autosaveState.textContent = 'draft restored';
  } else {
    editor.value = SAMPLE;
    autosaveState.textContent = 'sample loaded — edits autosave';
  }
  syncWidths();
  render();
  </script>
</body>
</html>
