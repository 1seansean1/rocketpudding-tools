<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mermaid Studio</title>
<meta name="description" content="Live Mermaid diagram editor — type Mermaid source on the left, see the rendered diagram on the right. Export SVG or PNG.">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%237a6cff'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f3ef; --fg:#191b1e; --muted:#8a8d93; --line:#dcd9d2; --card:#ffffff;
  --accent:#7a6cff;
  --accent-soft:rgba(122,108,255,.12);
  --err:#b42318; --ok:#1a7f4b;
  --shadow:0 1px 3px rgba(25,27,30,.06);
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#16171a; --fg:#eceae4; --line:#2b2d31; --card:#1e2024;
    --err:#ff6369; --ok:#3ecf8e;
    --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg);color:var(--fg);
  font-family:'IBM Plex Sans',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

/* ---------- header / footer ---------- */
header{
  flex:none;height:48px;display:flex;align-items:center;gap:10px;
  padding:0 16px;background:var(--card);border-bottom:1px solid var(--line);
}
.logo{
  width:11px;height:11px;border-radius:2px;background:var(--accent);
  box-shadow:0 0 8px rgba(122,108,255,.55);flex:none;
}
h1{
  margin:0;font-family:'IBM Plex Mono',monospace;font-weight:700;
  font-size:13px;letter-spacing:1.5px;color:var(--fg);white-space:nowrap;
}
.header-sub{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.back{
  margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;
  font-weight:500;letter-spacing:.5px;color:var(--muted);text-decoration:none;
  padding:5px 10px;border:1px solid var(--line);border-radius:13px;background:var(--card);
  transition:color .12s,border-color .12s;white-space:nowrap;
}
.back:hover{color:var(--accent);border-color:var(--accent)}
footer{
  flex:none;height:30px;display:flex;align-items:center;gap:8px;
  padding:0 16px;background:var(--card);border-top:1px solid var(--line);
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);
}
footer a{color:var(--muted);text-decoration:underline;text-underline-offset:2px}
footer a:hover{color:var(--accent)}
.foot-right{margin-left:auto}

/* ---------- layout ---------- */
main{flex:1;display:flex;min-height:0}
.pane{display:flex;flex-direction:column;min-width:0;min-height:0}
#editorPane{width:44%;min-width:260px;background:var(--card)}
#previewPane{flex:1;background:var(--bg)}
#divider{
  flex:none;width:6px;cursor:col-resize;background:transparent;
  border-left:1px solid var(--line);transition:background .12s;
}
#divider:hover,#divider.dragging{background:var(--accent-soft)}

/* ---------- toolbars ---------- */
.toolbar{
  flex:none;height:40px;display:flex;align-items:center;gap:6px;
  padding:0 10px;border-bottom:1px solid var(--line);background:var(--card);
}
.tool-label{
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:.8px;color:var(--muted);
}
select{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--fg);
  background:var(--card);border:1px solid var(--line);border-radius:6px;
  height:26px;padding:0 6px;cursor:pointer;outline:none;max-width:150px;
}
select:focus{border-color:var(--accent)}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  height:26px;padding:0 10px;border-radius:13px;border:1px solid var(--line);
  background:var(--card);color:var(--fg);cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;letter-spacing:.4px;
  transition:color .12s,border-color .12s;white-space:nowrap;user-select:none;
}
.btn:hover{color:var(--accent);border-color:var(--accent)}
.btn:active{transform:translateY(1px)}
.btn.icon{width:26px;padding:0}
.btn svg{flex:none}
.spacer{flex:1}
.zoom-label{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;
  color:var(--muted);min-width:38px;text-align:center;cursor:pointer;user-select:none;
}
.zoom-label:hover{color:var(--accent)}

/* ---------- editor ---------- */
#src{
  flex:1;width:100%;resize:none;border:none;outline:none;
  background:var(--card);color:var(--fg);
  font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;
  font-size:12.5px;line-height:1.6;padding:14px 16px;tab-size:2;
  white-space:pre;overflow:auto;
}
#statusBar{
  flex:none;border-top:1px solid var(--line);padding:7px 12px;
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;line-height:1.5;
  display:flex;align-items:flex-start;gap:8px;
  max-height:120px;overflow:auto;background:var(--card);
}
.dot{width:7px;height:7px;border-radius:50%;flex:none;margin-top:3px}
#statusBar.ok .dot{background:var(--ok)}
#statusBar.err .dot{background:var(--err)}
#statusMsg{white-space:pre-wrap;word-break:break-word;color:var(--muted)}
#statusBar.err #statusMsg{color:var(--err)}

/* ---------- preview ---------- */
#preview{flex:1;overflow:auto;display:flex}
#out{margin:auto;padding:24px}
#out svg{display:block}
.placeholder{
  font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  letter-spacing:.5px;
}

/* ---------- responsive ---------- */
@media (max-width: 820px){
  main{flex-direction:column}
  #divider{display:none}
  #editorPane{width:auto !important;min-width:0;height:45%;border-bottom:1px solid var(--line)}
  #previewPane{height:55%}
  .header-sub{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo" aria-hidden="true"></div>
  <h1>MERMAID STUDIO</h1>
  <span class="header-sub">live diagram editor</span>
  <a class="back" href="../../">&larr; tools</a>
</header>

<main>
  <section class="pane" id="editorPane" aria-label="Mermaid source editor">
    <div class="toolbar">
      <span class="tool-label">EXAMPLE</span>
      <select id="exampleSel" aria-label="Load example diagram">
        <option value="flowchart">Flowchart</option>
        <option value="sequence">Sequence</option>
        <option value="class">Class</option>
        <option value="state">State</option>
        <option value="gantt">Gantt</option>
        <option value="pie">Pie</option>
        <option value="mindmap">Mindmap</option>
      </select>
      <div class="spacer"></div>
      <button class="btn" id="copyBtn" title="Copy Mermaid source to clipboard">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
        <span id="copyLabel">COPY</span>
      </button>
    </div>
    <textarea id="src" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="Mermaid source code"></textarea>
    <div id="statusBar" class="ok">
      <span class="dot" aria-hidden="true"></span>
      <span id="statusMsg">ready</span>
    </div>
  </section>

  <div id="divider" role="separator" aria-orientation="vertical" title="Drag to resize panes"></div>

  <section class="pane" id="previewPane" aria-label="Rendered diagram preview">
    <div class="toolbar">
      <button class="btn icon" id="zoomOutBtn" title="Zoom out">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/></svg>
      </button>
      <span class="zoom-label" id="zoomLabel" title="Click to reset to 100%">FIT</span>
      <button class="btn icon" id="zoomInBtn" title="Zoom in">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/><path d="M8 11h6"/><path d="M11 8v6"/></svg>
      </button>
      <button class="btn" id="fitBtn" title="Fit diagram to pane">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M16 3h3a2 2 0 0 1 2 2v3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/><path d="M8 21H5a2 2 0 0 1-2-2v-3"/></svg>
        FIT
      </button>
      <div class="spacer"></div>
      <button class="btn" id="svgBtn" title="Download diagram as SVG">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="m7 11 5 5 5-5"/><path d="M4 21h16"/></svg>
        SVG
      </button>
      <button class="btn" id="pngBtn" title="Download diagram as PNG">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v13"/><path d="m7 11 5 5 5-5"/><path d="M4 21h16"/></svg>
        PNG
      </button>
    </div>
    <div id="preview">
      <div id="out"><span class="placeholder">rendering&hellip;</span></div>
    </div>
  </section>
</main>

<footer>
  <span>mermaid v11 &middot; <a href="LICENSE-mermaid.txt" title="Mermaid MIT license">MIT</a></span>
  <span class="foot-right">renders locally &middot; nothing leaves this page</span>
</footer>

<script src="mermaid.min.js"></script>
<script>
(function () {
  'use strict';

  /* ---------------- examples ---------------- */
  var EXAMPLES = {
    flowchart: [
      'flowchart TD',
      '  A[Request] --> B{Cache hit?}',
      '  B -- yes --> C[Serve from cache]',
      '  B -- no --> D[Fetch from origin]',
      '  D --> E[Store in cache]',
      '  E --> C',
      '  C --> F([Response])'
    ].join('\n'),
    sequence: [
      'sequenceDiagram',
      '  autonumber',
      '  participant U as User',
      '  participant W as Web App',
      '  participant A as API',
      '  participant D as Database',
      '  U->>W: Submit form',
      '  W->>A: POST /orders',
      '  A->>D: INSERT order',
      '  D-->>A: order id',
      '  A-->>W: 201 Created',
      '  W-->>U: Confirmation'
    ].join('\n'),
    'class': [
      'classDiagram',
      '  class Vehicle {',
      '    +String id',
      '    +start()',
      '    +stop()',
      '  }',
      '  class Car {',
      '    +int doors',
      '    +openTrunk()',
      '  }',
      '  class Motorcycle {',
      '    +bool hasSidecar',
      '  }',
      '  class Engine {',
      '    +int horsepower',
      '    +ignite()',
      '  }',
      '  Vehicle <|-- Car',
      '  Vehicle <|-- Motorcycle',
      '  Car o-- Engine'
    ].join('\n'),
    state: [
      'stateDiagram-v2',
      '  [*] --> Idle',
      '  Idle --> Running : start',
      '  Running --> Paused : pause',
      '  Paused --> Running : resume',
      '  Running --> Idle : stop',
      '  Running --> Failed : error',
      '  Failed --> Idle : reset',
      '  Idle --> [*] : shutdown'
    ].join('\n'),
    gantt: [
      'gantt',
      '  title Release 1.4',
      '  dateFormat YYYY-MM-DD',
      '  section Design',
      '    Wireframes     :a1, 2026-07-01, 5d',
      '    Design review  :a2, after a1, 2d',
      '  section Build',
      '    API            :b1, after a2, 8d',
      '    Frontend       :b2, after a2, 10d',
      '  section Ship',
      '    QA pass        :c1, after b2, 4d',
      '    Deploy         :milestone, after c1, 0d'
    ].join('\n'),
    pie: [
      'pie showData',
      '  title Storage by service',
      '  "Postgres" : 42.5',
      '  "Object store" : 25.3',
      '  "Kafka" : 18.2',
      '  "Redis" : 8.4',
      '  "Other" : 5.6'
    ].join('\n'),
    mindmap: [
      'mindmap',
      '  root((Platform))',
      '    Ingest',
      '      Webhooks',
      '      Batch upload',
      '    Storage',
      '      Postgres',
      '      Object store',
      '    Serve',
      '      REST API',
      '      Websockets',
      '    Observe',
      '      Metrics',
      '      Tracing',
      '      Alerts'
    ].join('\n')
  };

  /* ---------------- dom refs ---------------- */
  var $ = function (id) { return document.getElementById(id); };
  var src = $('src'), out = $('out'), preview = $('preview');
  var statusBar = $('statusBar'), statusMsg = $('statusMsg');
  var exampleSel = $('exampleSel');
  var copyBtn = $('copyBtn'), copyLabel = $('copyLabel');
  var svgBtn = $('svgBtn'), pngBtn = $('pngBtn');
  var zoomInBtn = $('zoomInBtn'), zoomOutBtn = $('zoomOutBtn');
  var fitBtn = $('fitBtn'), zoomLabel = $('zoomLabel');
  var editorPane = $('editorPane'), divider = $('divider');

  var STORE_KEY = 'mermaid-studio.src';
  var renderSeq = 0;
  var natW = 0, natH = 0;      // natural diagram size from viewBox
  var fitMode = true, zoom = 1;
  var mq = window.matchMedia('(prefers-color-scheme: dark)');

  /* ---------------- mermaid setup ---------------- */
  function initMermaid() {
    mermaid.initialize({
      startOnLoad: false,
      suppressErrorRendering: true,
      securityLevel: 'strict',
      theme: mq.matches ? 'dark' : 'default',
      fontFamily: "'IBM Plex Sans', system-ui, sans-serif",
      themeVariables: { fontFamily: "'IBM Plex Sans', system-ui, sans-serif" }
    });
  }

  /* ---------------- status ---------------- */
  function setStatus(kind, msg) {
    statusBar.className = kind;
    statusMsg.textContent = msg;
  }

  /* ---------------- render ---------------- */
  function measure(svgEl) {
    natW = 0; natH = 0;
    try {
      var vb = svgEl.viewBox && svgEl.viewBox.baseVal;
      if (vb && vb.width > 0 && vb.height > 0) { natW = vb.width; natH = vb.height; return; }
      var bb = svgEl.getBBox();
      natW = bb.width || 600; natH = bb.height || 400;
    } catch (e) { natW = 600; natH = 400; }
  }

  function fitZoom() {
    if (!natW || !natH) return 1;
    var pad = 48;
    var zw = (preview.clientWidth - pad) / natW;
    var zh = (preview.clientHeight - pad) / natH;
    return Math.max(0.05, Math.min(zw, zh, 1));
  }

  function applyZoom() {
    var svgEl = out.querySelector('svg');
    if (!svgEl || !natW || !natH) return;
    var z = fitMode ? fitZoom() : zoom;
    svgEl.style.maxWidth = 'none';
    svgEl.style.maxHeight = 'none';
    svgEl.style.width = (natW * z) + 'px';
    svgEl.style.height = (natH * z) + 'px';
    zoomLabel.textContent = fitMode ? 'FIT' : Math.round(z * 100) + '%';
  }

  function render() {
    var code = src.value;
    if (!code.trim()) {
      out.innerHTML = '<span class="placeholder">nothing to render</span>';
      setStatus('ok', 'empty source');
      return;
    }
    var id = 'ms-' + (++renderSeq);
    var mySeq = renderSeq;
    var t0 = performance.now();
    mermaid.parse(code)
      .then(function () { return mermaid.render(id, code); })
      .then(function (res) {
        if (mySeq !== renderSeq) return; // a newer render superseded this one
        out.innerHTML = res.svg;
        var svgEl = out.querySelector('svg');
        if (res.bindFunctions) { try { res.bindFunctions(out); } catch (e) {} }
        if (svgEl) { measure(svgEl); applyZoom(); }
        var ms = Math.max(1, Math.round(performance.now() - t0));
        setStatus('ok', 'rendered in ' + ms + ' ms');
      })
      .catch(function (e) {
        // mermaid can leave a scratch node behind on failure - clean it up
        var stray = document.getElementById(id);
        if (stray) stray.remove();
        stray = document.getElementById('d' + id);
        if (stray) stray.remove();
        if (mySeq !== renderSeq) return;
        var msg = (e && (e.str || e.message)) ? (e.str || e.message) : String(e);
        setStatus('err', msg.trim());
        // last good render stays in #out
      });
  }

  /* ---------------- input, debounced ~300ms ---------------- */
  var timer = null;
  src.addEventListener('input', function () {
    try { localStorage.setItem(STORE_KEY, src.value); } catch (e) {}
    if (timer) clearTimeout(timer);
    timer = setTimeout(render, 300);
  });
  src.addEventListener('keydown', function (e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      if (timer) clearTimeout(timer);
      render();
    }
    if (e.key === 'Tab') {
      e.preventDefault();
      var s = src.selectionStart, epos = src.selectionEnd;
      src.value = src.value.slice(0, s) + '  ' + src.value.slice(epos);
      src.selectionStart = src.selectionEnd = s + 2;
      src.dispatchEvent(new Event('input'));
    }
  });

  /* ---------------- examples ---------------- */
  exampleSel.addEventListener('change', function () {
    var key = exampleSel.value;
    if (!EXAMPLES[key]) return;
    src.value = EXAMPLES[key];
    try { localStorage.setItem(STORE_KEY, src.value); } catch (e) {}
    fitMode = true;
    if (timer) clearTimeout(timer);
    render();
  });

  /* ---------------- copy source ---------------- */
  function flashCopied(ok) {
    copyLabel.textContent = ok ? 'COPIED' : 'FAILED';
    setTimeout(function () { copyLabel.textContent = 'COPY'; }, 1200);
  }
  copyBtn.addEventListener('click', function () {
    var text = src.value;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { flashCopied(true); },
        function () { legacyCopy(text); }
      );
    } else {
      legacyCopy(text);
    }
  });
  function legacyCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    var ok = false;
    try { ok = document.execCommand('copy'); } catch (e) {}
    ta.remove();
    flashCopied(ok);
  }

  /* ---------------- zoom / fit ---------------- */
  function clampZoom(z) { return Math.min(8, Math.max(0.1, z)); }
  function stepZoom(factor) {
    if (fitMode) { zoom = fitZoom(); fitMode = false; }
    zoom = clampZoom(zoom * factor);
    applyZoom();
  }
  zoomInBtn.addEventListener('click', function () { stepZoom(1.25); });
  zoomOutBtn.addEventListener('click', function () { stepZoom(1 / 1.25); });
  fitBtn.addEventListener('click', function () { fitMode = true; applyZoom(); });
  zoomLabel.addEventListener('click', function () { fitMode = false; zoom = 1; applyZoom(); });
  preview.addEventListener('wheel', function (e) {
    if (!e.ctrlKey && !e.metaKey) return;
    e.preventDefault();
    stepZoom(e.deltaY < 0 ? 1.12 : 1 / 1.12);
  }, { passive: false });
  window.addEventListener('resize', function () { if (fitMode) applyZoom(); });

  /* ---------------- export ---------------- */
  function currentSvgText() {
    var svgEl = out.querySelector('svg');
    if (!svgEl || !natW || !natH) return null;
    var clone = svgEl.cloneNode(true);
    clone.setAttribute('width', String(Math.round(natW)));
    clone.setAttribute('height', String(Math.round(natH)));
    clone.style.width = '';
    clone.style.height = '';
    clone.style.maxWidth = '';
    clone.style.maxHeight = '';
    if (!clone.getAttribute('xmlns')) {
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    }
    return '<?xml version="1.0" encoding="UTF-8"?>\n' +
      new XMLSerializer().serializeToString(clone);
  }

  function triggerDownload(blob, filename) {
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function () { URL.revokeObjectURL(url); }, 4000);
  }

  svgBtn.addEventListener('click', function () {
    var text = currentSvgText();
    if (!text) { setStatus('err', 'no diagram to export'); return; }
    triggerDownload(new Blob([text], { type: 'image/svg+xml;charset=utf-8' }), 'mermaid-diagram.svg');
  });

  pngBtn.addEventListener('click', function () {
    var text = currentSvgText();
    if (!text) { setStatus('err', 'no diagram to export'); return; }
    var scale = 2;
    var maxDim = 8192;
    if (natW * scale > maxDim || natH * scale > maxDim) {
      scale = Math.max(1, Math.min(maxDim / natW, maxDim / natH));
    }
    var img = new Image();
    var url = URL.createObjectURL(new Blob([text], { type: 'image/svg+xml;charset=utf-8' }));
    img.onload = function () {
      try {
        var canvas = document.createElement('canvas');
        canvas.width = Math.max(1, Math.round(natW * scale));
        canvas.height = Math.max(1, Math.round(natH * scale));
        var ctx = canvas.getContext('2d');
        var bg = getComputedStyle(document.documentElement).getPropertyValue('--card').trim() || '#ffffff';
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        canvas.toBlob(function (blob) {
          if (blob) triggerDownload(blob, 'mermaid-diagram.png');
          else setStatus('err', 'PNG encode failed');
        }, 'image/png');
      } catch (e) {
        setStatus('err', 'PNG export failed: ' + (e.message || e));
      } finally {
        URL.revokeObjectURL(url);
      }
    };
    img.onerror = function () {
      URL.revokeObjectURL(url);
      setStatus('err', 'PNG export failed: could not rasterize SVG');
    };
    img.src = url;
  });

  /* ---------------- resizable divider ---------------- */
  divider.addEventListener('pointerdown', function (e) {
    e.preventDefault();
    divider.classList.add('dragging');
    divider.setPointerCapture(e.pointerId);
    var move = function (ev) {
      var mainRect = document.querySelector('main').getBoundingClientRect();
      var w = ev.clientX - mainRect.left;
      var min = 240, max = mainRect.width - 320;
      w = Math.min(Math.max(w, min), Math.max(min, max));
      editorPane.style.width = w + 'px';
      if (fitMode) applyZoom();
    };
    var up = function () {
      divider.classList.remove('dragging');
      divider.removeEventListener('pointermove', move);
      divider.removeEventListener('pointerup', up);
      divider.removeEventListener('pointercancel', up);
    };
    divider.addEventListener('pointermove', move);
    divider.addEventListener('pointerup', up);
    divider.addEventListener('pointercancel', up);
  });

  /* ---------------- theme change ---------------- */
  var onTheme = function () { initMermaid(); render(); };
  if (mq.addEventListener) mq.addEventListener('change', onTheme);
  else if (mq.addListener) mq.addListener(onTheme);

  /* ---------------- boot ---------------- */
  initMermaid();
  var saved = null;
  try { saved = localStorage.getItem(STORE_KEY); } catch (e) {}
  if (saved && saved.trim()) {
    src.value = saved;
  } else {
    src.value = EXAMPLES.flowchart;
    exampleSel.value = 'flowchart';
  }
  render();
})();
</script>
</body>
</html>
