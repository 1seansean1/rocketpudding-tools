<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rocket Pudding Tools</title>
<meta name="description" content="A growing registry of self-contained web tools.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  :root{
    --bg:#f4f3ef; --fg:#191b1e; --muted:#8a8d93; --line:#dcd9d2; --card:#ffffff;
    --accent:#b05a3c; --accent-soft:#f3e7e0;
  }
  @media (prefers-color-scheme: dark){
    :root{ --bg:#16171a; --fg:#eceae4; --muted:#8a8d93; --line:#2b2d31; --card:#1e2024; --accent:#d07a58; --accent-soft:#2a211d; }
  }
  html,body{margin:0;min-height:100%;background:var(--bg);color:var(--fg);
    font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--accent);color:var(--bg)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}
  header.top{display:flex;align-items:center;gap:12px;height:60px;border-bottom:1px solid var(--line)}
  .logo{width:13px;height:13px;border-radius:3px;background:var(--accent);box-shadow:0 0 10px rgba(176,90,60,.55)}
  .brand{font-family:'IBM Plex Mono',monospace;font-weight:700;letter-spacing:1.6px;font-size:13px}
  .brand .rp{color:var(--accent)}
  .count{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted)}
  .hero{padding:52px 0 30px}
  .hero h1{margin:0 0 10px;font-size:30px;letter-spacing:-.01em;font-weight:600}
  .hero p{margin:0;max-width:620px;color:var(--muted);font-size:15px;line-height:1.6}
  .search{margin:26px 0 8px;display:flex;align-items:center;gap:10px;border:1px solid var(--line);
    background:var(--card);border-radius:10px;padding:10px 14px}
  .search input{flex:1;border:none;background:transparent;color:var(--fg);font:500 14px 'IBM Plex Sans';outline:none}
  .search .k{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);border:1px solid var(--line);border-radius:5px;padding:2px 6px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;padding:14px 0 60px}
  .card{display:flex;flex-direction:column;border:1px solid var(--line);background:var(--card);border-radius:14px;
    padding:18px 18px 16px;transition:border-color .15s ease,transform .15s ease}
  .card:hover{border-color:var(--accent);transform:translateY(-2px)}
  .card .row{display:flex;align-items:center;gap:9px}
  .swatch{width:10px;height:10px;border-radius:3px;flex:none}
  .card h3{margin:0;font-size:16px;font-weight:600}
  .status{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:3px 9px}
  .card .tag{margin:12px 0 6px;color:var(--fg);font-size:13.5px;line-height:1.5}
  .card .desc{color:var(--muted);font-size:12px;line-height:1.55;flex:1}
  .chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:13px}
  .chip{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:2px 8px}
  .open{margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--accent);display:flex;align-items:center;gap:6px}
  .empty{padding:40px 0;color:var(--muted);font-size:14px}
  footer{border-top:1px solid var(--line);padding:22px 0 40px;color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:11px;display:flex;gap:14px;flex-wrap:wrap}
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="logo"></div>
      <div class="brand"><span class="rp">ROCKET&nbsp;PUDDING</span>&nbsp;TOOLS</div>
      <div class="count" id="count"></div>
    </header>
    <section class="hero">
      <h1>Tools</h1>
      <p>A growing registry of self-contained web tools. Each one is a single-purpose, no-install
         page you can open and use immediately.</p>
      <div class="search">
        <span style="color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px">/</span>
        <input id="q" placeholder="Search tools, tags, algorithms…" autocomplete="off" spellcheck="false">
        <span class="k">esc to clear</span>
      </div>
    </section>
    <main class="grid" id="grid"></main>
    <footer>
      <span>registry.json</span>
      <span id="updated"></span>
      <span>self-contained · no tracking</span>
    </footer>
  </div>
<script>
  const grid = document.getElementById('grid');
  const q = document.getElementById('q');
  let TOOLS = [];
  function card(t){
    const chips = (t.tags||[]).slice(0,7).map(x=>`<span class="chip">${x}</span>`).join('');
    return `<a class="card" href="${t.path||t.entry||('tools/'+t.slug+'/')}">
      <div class="row">
        <span class="swatch" style="background:${t.accent||'#b05a3c'}"></span>
        <h3>${t.name}</h3>
        <span class="status">${t.status||'live'}</span>
      </div>
      <div class="tag">${t.tagline||''}</div>
      <div class="desc">${t.description||''}</div>
      <div class="chips">${chips}</div>
      <div class="open">Open tool →</div>
    </a>`;
  }
  function render(list){
    grid.innerHTML = list.length ? list.map(card).join('')
      : '<div class="empty">No tools match that search.</div>';
    document.getElementById('count').textContent = TOOLS.length + (TOOLS.length===1?' tool':' tools');
  }
  function filter(){
    const s = q.value.trim().toLowerCase();
    if(!s) return render(TOOLS);
    render(TOOLS.filter(t => (t.name+' '+(t.tagline||'')+' '+(t.description||'')+' '+(t.tags||[]).join(' ')).toLowerCase().includes(s)));
  }
  q.addEventListener('input', filter);
  q.addEventListener('keydown', e => { if(e.key==='Escape'){ q.value=''; filter(); } });
  fetch('registry.json').then(r=>r.json()).then(d=>{
    TOOLS = d.tools||[];
    if(d.updated) document.getElementById('updated').textContent = 'updated '+d.updated;
    render(TOOLS);
  }).catch(()=>{ grid.innerHTML='<div class="empty">Could not load registry.json.</div>'; });
</script>
</body>
</html>
